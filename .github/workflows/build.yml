name: Build Duplicate Photo Finder

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: DuplicatePhotoFinder.exe
            asset_name: DuplicatePhotoFinder-Windows.exe
          - os: macos-latest
            artifact_name: DuplicatePhotoFinder
            asset_name: DuplicatePhotoFinder-macOS
          - os: ubuntu-latest
            artifact_name: DuplicatePhotoFinder
            asset_name: DuplicatePhotoFinder-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow pillow-heif pyinstaller

      - name: Build executable
        run: >
          pyinstaller
          --onefile
          --windowed
          --name DuplicatePhotoFinder
          --hidden-import=pillow_heif
          --hidden-import=PIL
          find_duplicates_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          mkdir release
          cp artifacts/DuplicatePhotoFinder-Windows.exe/DuplicatePhotoFinder.exe release/DuplicatePhotoFinder-Windows.exe
          cp artifacts/DuplicatePhotoFinder-macOS/DuplicatePhotoFinder release/DuplicatePhotoFinder-macOS
          cp artifacts/DuplicatePhotoFinder-Linux/DuplicatePhotoFinder release/DuplicatePhotoFinder-Linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
